services:
  cursor-api-proxy:
    build:
      context: .
      args:
        UPSTREAM_REF: main
    image: cursor-api-proxy:latest
    container_name: cursor-api-proxy
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - CURSOR_BRIDGE_API_KEY=${CURSOR_BRIDGE_API_KEY:-}
      - CURSOR_API_KEY=${CURSOR_API_KEY:-}
      - CURSOR_BRIDGE_PORT=8765
      - CURSOR_BRIDGE_MODE=${CURSOR_BRIDGE_MODE:-ask}
      - CURSOR_BRIDGE_DEFAULT_MODEL=${CURSOR_BRIDGE_DEFAULT_MODEL:-auto}
      - CURSOR_BRIDGE_CHAT_ONLY_WORKSPACE=true
    volumes:
      - proxy-state:/root/.cursor-api-proxy
      - agent-config:/root/.cursor-agent

volumes:
  proxy-state:
  agent-config:
